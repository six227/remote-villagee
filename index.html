<!DOCTYPE html>
<html lang="zh-HK">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <title>香港都市傳說 RPG</title>

        <style>
           /* 導覽列外框 */
            .navbar {
                display: flex;           /* 讓裡面的 logo 和連結橫排 */
                justify-content: space-between;  /* 左右分開 */
                align-items: center;     /* 垂直置中 */
                background-color: #2c2525;
                padding: 1.3rem 2rem;}
            /* 連結橫排 */
            .nav-links {
                display: flex;
                gap: 2rem;
                flex-wrap: wrap;
            }
            /* 連結樣式 */
            .nav-links a {
                color: white;
                text-decoration: none;
                transition: 0.3s;
                font-size: 1rem;
                font-weight: 500;
                font-weight: bold;
            }
            /* 滑鼠移上去的效果 */
            .nav-links a:hover {
                color: #df3c33;
            }
            
            /* Game name */
            .logo{
                font-size: 1.5rem;
                font-weight: bold;
                color: #e6c300;
                font-family: 'Segoe UI', cursive;
                letter-spacing: 1px;
            }
            /* body */
            body{
                background-color: #1a1a1a;
                margin: 0;
                font-family: Arial, sans-serif;
            }

            /* photo */
            .photo {
                background-image: url('https://picsum.photos/id/104/1920/600');  /* 暫時用示意圖，之後換成你的照片 */
                background-size: cover;
                background-position: center;
                height: 500px;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                position: relative;
            }
            /* 半透明遮罩，讓文字更清楚 */
            .photo::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
            }
            .photo-content {
                position: relative;
                z-index: 1;
            }
            .game-title {
                font-size: 4rem;
                color: #e6c300;
                margin-bottom: 1rem;
                font-family: 'Caveat', 'Segoe UI', cursive;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            }
            .game-subtitle {
                font-size: 1.2rem;
                color: white;
                letter-spacing: 1px;
            }
            
        </style>
    </head>
    
    <body>
        <div class="navbar">
            <div class="logo">Game name</div>
            <div class="nav-links">
                <a href="#">HOME</a >
                <a href="#">BACKGROUND</a >
                <a href="#">CHARACTERS</a >
                <a href="#">GAMEPLAY</a >
            </div>
        </div>
        
        /* photo */
        <div class="photo">
            <div class="photo-content">
                <h1 class="game-title">《Game Name》</h1>
                <p class="game-subtitle">Inspired by Hong Kong urban legends · narrative-driven RPG</p >
            </div>
        </div>
        
    </body>
    
    <main>
        
    </main>
</html>
