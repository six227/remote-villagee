<!DOCTYPE html>
<html lang="zh-HK">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <title>香港都市傳說 RPG</title>

        <style>
           /* 導覽列外框 */
            .navbar {
                display: flex;           /* 讓裡面的 logo 和連結橫排 */
                justify-content: space-between;  /* 左右分開 */
                align-items: center;     /* 垂直置中 */
                background-color: #2c2525;
                padding: 1rem 2rem;}
            /* 連結橫排 */
            .nav-links {
                display: flex;
                gap: 2rem;
                flex-wrap: wrap;
            }
            /* 連結樣式 */
            .nav-links a {
                color: white;
                text-decoration: none;
                transition: 0.3s;
                font-weight: 500;
            }
            /* 滑鼠移上去的效果 */
            .nav-links a:hover {
                color: #b55b3c;
            }
            
        </style>
    </head>
    
    <body>
        <div class="navbar">
            <div class="logo">Game name</div>
            <div class="nav-links">
                <a href=" ">HOME</a >
                <a href="#">BACKGROUND</a >
                <a href="#">CHARACTERS</a >
                <a href="#">GAMEPLAY</a >
            </div>
        </div>

        <h1><strong>《Game Name》</strong></h1>
    </body>
    
    <main>
        
    </main>
</html>
